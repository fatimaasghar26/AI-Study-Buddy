<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="planner.css">
</head>
<body>

  <nav class="nav-container">
    <h1 class="logo">AI Study Buddy</h1>
    <ul class="navbar">
      <li><a href="AI Chat.html">AI Chat</a></li>
      <li><a href="Study Planner.html" class="active">Study Planner</a></li>
      <li><a href="Study Timer.html">Study Timer</a></li>
      <li><a href="Account.html">Account</a></li>
    </ul>
  </nav>

  <div class="planner-container">
    <h2 class="planner-title">Study Planner</h2>
    <p class="planner-sub">Add and manage your tasks and assignments.</p>
    <hr>

    <div class="planner-form">
      <div class="form-row">
        <div class="form-group">
          <label>Task Name</label>
          <input type="text" id="taskName" placeholder="e.g. Quiz 2 Preparation">
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" id="taskSubject" placeholder="e.g. Information Security">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="taskDate">
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="taskPriority">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </div>
      </div>
      <button class="add-btn" onclick="addTask()">+ Add Task</button>
    </div>

    <div class="task-filters">
      <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
      <button class="filter-btn" onclick="filterTasks('pending', this)">Pending</button>
      <button class="filter-btn" onclick="filterTasks('done', this)">Completed</button>
    </div>

    <div class="task-list" id="taskList">
      <p class="empty-msg" id="emptyMsg">No tasks yet. Add one above!</p>
    </div>
  </div>

  <script src="planner.js"></script>
</body>
</html>
